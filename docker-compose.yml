version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: proptrack
      POSTGRES_PASSWORD: proptrack
      POSTGRES_DB: proptrack
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U proptrack" ]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
